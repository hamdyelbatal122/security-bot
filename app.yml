name: security-bot
description: >
  Scans every Pull Request for OWASP Top 10 security vulnerabilities,
  posts inline review comments with actionable fixes, applies severity
  labels automatically, and sets up branch protection for new repositories.

url: https://github.com/hamdyelbatal122/security-bot

# Webhook events the app subscribes to
default_events:
  - repository
  - pull_request
  - push

# Required permissions
default_permissions:
  # Read repo contents to fetch diffs
  contents: read
  # Post comments and labels on issues/PRs
  issues: write
  pull_requests: write
  # Post check runs with scan results
  checks: write
  # Apply branch protection rules
  administration: write
  # Read metadata (required by all GitHub Apps)
  metadata: read
