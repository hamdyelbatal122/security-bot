name: security-bot
description: >
  Automated security code review for every Pull Request. Scans code diffs against
  14 OWASP Top 10 rules, posts inline review comments with actionable fix guidance,
  applies severity labels, and configures branch protection on new repositories.
  Zero configuration — just install and go.

url: https://github.com/hamdyelbatal122/security-bot

# Webhook events the app subscribes to
default_events:
  - repository
  - pull_request
  - push

# Required permissions for the GitHub App
default_permissions:
  # Read repository contents to fetch and analyze code diffs
  contents: read
  # Post comments, labels, and manage pull request reviews
  pull_requests: write
  issues: write
  # Post check runs with detailed scan results
  checks: write
  # Apply branch protection rules to new repositories
  administration: write
  # Required by all GitHub Apps for basic metadata
  metadata: read
